services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://ourpresent:ourpresent@db:5432/ourpresent}
      OBJECT_STORE_ENDPOINT: ${OBJECT_STORE_ENDPOINT:-http://minio:9000}
      OBJECT_STORE_ACCESS_KEY: ${OBJECT_STORE_ACCESS_KEY:-minioadmin}
      OBJECT_STORE_SECRET_KEY: ${OBJECT_STORE_SECRET_KEY:-minioadmin}
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: on-failure
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; response = urlopen('http://127.0.0.1:8000/healthz'); raise SystemExit(0 if response.status == 200 else 1)",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ourpresent
      POSTGRES_PASSWORD: ourpresent
      POSTGRES_DB: ourpresent
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ourpresent"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do
          sleep 1
        done
        mc mb --ignore-existing local/ourpresent
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_healthy

volumes:
  pg_data:
  minio_data:
